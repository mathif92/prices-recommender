services:
  postgres:
    image: postgres:17-alpine
    container_name: prices-recommender-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: prices
      POSTGRES_PASSWORD: prices
      POSTGRES_DB: prices_recommender
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prices -d prices_recommender"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
